name: Midday build (Linux)

on:
  push:
    branches:
     - "**"
  pull_request:
    branches:
     - "**"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build-pack-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - run: sudo apt update
      - run: sudo apt install libgtk-4-dev libadwaita-1-dev build-essential mingw-w64
      - run: rustup target add x86_64-pc-windows-gnu

      - name: Update dependencies
        run: bash update_dependencies.sh

      - name: Generate version
        run: bash src/common/src/generate-version.sh

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Rust
        run: cargo build --release

      - run: cargo build --bin Sonic4FilePatcher --target x86_64-pc-windows-gnu --release

      - name: Pack
        run: bash pack_linux.sh
        
      - uses: actions/upload-artifact@v7
        with:
          name: Sonic4ModLoader_linux.zip
          path: dist/Sonic4ModLoader_linux.zip
          archive: false

      - uses: actions/upload-artifact@v7
        with:
          name: SHA256SUMS_linux
          path: dist/SHA256SUMS_linux
          archive: false

      - run: cargo test --no-fail-fast
