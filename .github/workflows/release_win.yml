name: Release (Windows)

on:
  release:
    types: [published]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build-pack-test-win64:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v1.3

      - uses: actions/setup-python@v2

      - name: Set gtk-build-moment-stamp for cache
        run: echo "stamp=$([Math]::Truncate(($(Get-Date).DayofYear / 7)))" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        id: gtk-build-moment-stamp

      - uses: actions/cache@v4
        id: cache-gtk
        with:
          path: |
            C:/gtk-build/gtk/x64/release
            C:/gtk-build/src
          key: ${{ runner.os }}-gtk-build-binaries-${{ steps.gtk-build-moment-stamp.outputs.stamp }}

      - run: pipx install uv
        if: ${{ steps.cache-gtk.outputs.cache-hit != 'true' }}
      - run: echo "C:\Users\runneradmin\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        if: ${{ steps.cache-gtk.outputs.cache-hit != 'true' }}
      - run: uv tool install gvsbuild
        if: ${{ steps.cache-gtk.outputs.cache-hit != 'true' }}
      - run: uv run gvsbuild build gtk4 libadwaita librsvg --vs-ver vs2026
        if: ${{ steps.cache-gtk.outputs.cache-hit != 'true' }}
      - run: echo "C:\gtk-build\gtk\x64\release\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Update dependencies
        run: bash update_dependencies.sh

      - name: Generate version
        run: bash src/common/src/generate-version.sh

      - name: Build .Net
        run: dotnet publish src_old -c Release -m

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Rust
        run: cargo build --release

      - name: Pack
        run: bash pack_win.sh

      - uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: 'gtk-src-win.zip'
          directory: C:/gtk-build/src

      - uses: actions/upload-artifact@v7
        with:
          name: gtk-src-win.zip
          path: C:/gtk-build/src/gtk-src-win.zip
          archive: false

      - uses: actions/upload-artifact@v7
        with:
          name: Sonic4ModLoader_win.zip
          path: dist/Sonic4ModLoader_win.zip
          archive: false

      - uses: actions/upload-artifact@v7
        with:
          name: SHA256SUMS_win
          path: dist/SHA256SUMS_win
          archive: false

      - run: cargo test --no-fail-fast

      - uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          files: |
            dist/SHA256SUMS_win
            dist/Sonic4ModLoader_win.zip
            C:/gtk-build/src/gtk-src-win.zip
